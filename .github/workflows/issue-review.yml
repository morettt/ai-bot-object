name: Issue Review Bot

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Review Issue with llm
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';

            let pluginJson = null;
            const jsonMatch = body.match(/\{[\s\S]*?\}/);
            if (jsonMatch) {
              try {
                pluginJson = JSON.parse(jsonMatch[0]);
              } catch (e) {}
            }

            if (pluginJson && pluginJson.repo) {
              const repoUrl = pluginJson.repo.trim();
              const repoMatch = repoUrl.match(/github\.com\/([^\/]+)\/([^\/?#]+)/);

              if (!repoMatch) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: ['## \u{1F916} AI \u63D2\u4EF6\u4EE3\u7801\u5BA1\u6838', '', '\u274C \u65E0\u6CD5\u89E3\u6790\u4ED3\u5E93\u5730\u5740\uFF1A`' + repoUrl + '`', '---', '*\u6B64\u8BC4\u8BBA\u7531 AI \u673A\u5668\u4EBA\u81EA\u52A8\u751F\u6210\uFF0C\u4EC5\u4F9B\u53C2\u8003\u3002*'].join('\n')
                });
                return;
              }

              const repoOwner = repoMatch[1];
              const repoName  = repoMatch[2].replace(/\.git$/, '');

              let fileTree;
              try {
                const treeResp = await github.rest.git.getTree({
                  owner: repoOwner, repo: repoName, tree_sha: 'HEAD', recursive: '1'
                });
                fileTree = treeResp.data.tree.filter(f => f.type === 'blob');
              } catch (err) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: ['## \u{1F916} AI \u63D2\u4EF6\u4EE3\u7801\u5BA1\u6838', '', '\u274C \u65E0\u6CD5\u8BBF\u95EE\u4ED3\u5E93 `' + repoOwner + '/' + repoName + '`\uFF0C\u8BF7\u786E\u8BA4\u4ED3\u5E93\u662F\u516C\u5F00\u7684\u3002', '---', '*\u6B64\u8BC4\u8BBA\u7531 AI \u673A\u5668\u4EBA\u81EA\u52A8\u751F\u6210\uFF0C\u4EC5\u4F9B\u53C2\u8003\u3002*'].join('\n')
                });
                return;
              }

              const CODE_EXTS = ['.js', '.ts', '.mjs', '.cjs', '.py', '.go',
                                 '.rs', '.java', '.cpp', '.c', '.cs', '.rb',
                                 '.php', '.sh', '.bash', '.json', '.md'];
              const MAX_FILES = 15;
              const MAX_CHARS = 60000;

              const mainFile = pluginJson.main || '';
              const sortedFiles = fileTree
                .filter(f => CODE_EXTS.some(ext => f.path.endsWith(ext)))
                .sort((a, b) => {
                  if (a.path === mainFile) return -1;
                  if (b.path === mainFile) return 1;
                  return 0;
                })
                .slice(0, MAX_FILES);

              let codeContents = '';
              for (const file of sortedFiles) {
                if (codeContents.length >= MAX_CHARS) break;
                try {
                  const resp = await github.rest.repos.getContent({
                    owner: repoOwner, repo: repoName, path: file.path
                  });
                  const raw = Buffer.from(resp.data.content, 'base64').toString('utf-8');
                  codeContents += '\n\n=== ' + file.path + ' ===\n' + raw.slice(0, MAX_CHARS - codeContents.length);
                } catch (e) {}
              }

              if (!codeContents.trim()) codeContents = '(\u672A\u627E\u5230\u53EF\u8BFB\u53D6\u7684\u4EE3\u7801\u6587\u4EF6)';

              const pluginInfo = [
                '\u63D2\u4EF6\u540D\u79F0\uFF1A' + (pluginJson.displayName || pluginJson.name || '\u672A\u77E5'),
                '\u63CF\u8FF0\uFF1A' + (pluginJson.description || '(\u65E0)'),
                '\u4F5C\u8005\uFF1A' + (pluginJson.author || '\u672A\u77E5'),
                '\u5165\u53E3\u6587\u4EF6\uFF1A' + (pluginJson.main || '\u672A\u77E5'),
                '\u4ED3\u5E93\uFF1A' + repoUrl
              ].join('\n');

              const systemPromptWhite = [
                '\u4F60\u662F\u4E00\u4E2A\u5BF9\u63D2\u4EF6\u5145\u6EE1\u70ED\u60C5\u7684\u5BA1\u6838\u5458\u201C\u767D\u8138\u201D\uFF0C\u4F60\u559C\u6B22\u53D1\u73B0\u4EE3\u7801\u4E2D\u7684\u9597\u70B9\u3001\u4EAE\u70B9\u548C\u521B\u610F\u3002',
                '\u8BF7\u4ECE\u4EE5\u4E0B\u89D2\u5EA6\u5BA1\u6838\u63D2\u4EF6\u4EE3\u7801\uFF0C\u5C3D\u53EF\u80FD\u627E\u5230\u4EAE\u70B9\uFF1A',
                '1. \u4EE3\u7801\u8D28\u91CF\u4E0E\u89C4\u8303\uFF1A\u5C3D\u91CF\u8868\u626C\u5199\u5F97\u597D\u7684\u5730\u65B9',
                '2. \u5B89\u5168\u6027\uFF1A\u6307\u51FA\u5B89\u5168\u7684\u5904\u7406\u65B9\u5F0F',
                '3. \u529F\u80FD\u5B9E\u73B0\uFF1A\u76D8\u70B9\u63D2\u4EF6\u505A\u5230\u4E86\u4EC0\u4E48',
                '\u8BED\u6C14\u70ED\u60C5\u3001\u5145\u6EE1\u6B63\u80FD\u91CF\uFF0C\u591A\u7528\u591A\u7528\u8D5E\u7F8E\u7684\u8BCD\u3002\u7528\u4E2D\u6587\u56DE\u590D\u3002\u6700\u540E\u7528\u4E00\u53E5\u8BDD\u603B\u7ED3\u4F60\u7684\u7ACB\u573A\u3002'
              ].join('\n');

              const systemPromptBlack = [
                '\u4F60\u662F\u4E00\u4E2A\u6781\u5176\u4E25\u8C28\u6311\u5C42\u7684\u5BA1\u6838\u5458\u201C\u9ED1\u8138\u201D\uFF0C\u4F60\u5BF9\u4EE3\u7801\u8D28\u91CF\u8981\u6C42\u6781\u9AD8\uFF0C\u4E0D\u653E\u8FC7\u4EFB\u4F55\u95EE\u9898\u3002',
                '\u8BF7\u4ECE\u4EE5\u4E0B\u89D2\u5EA6\u4E25\u683C\u5BA1\u6838\u63D2\u4EF6\u4EE3\u7801\uFF0C\u627E\u5230\u6240\u6709\u95EE\u9898\uFF1A',
                '1. \u5B89\u5168\u9690\u60A3\uFF1A\u6709\u6CA1\u6709\u5371\u9669\u64CD\u4F5C\u3001\u53EF\u7591\u7F51\u7EDC\u8BF7\u6C42\u3001\u6743\u9650\u6EE5\u7528',
                '2. \u4EE3\u7801\u7F3A\u9677\uFF1A\u547D\u540D\u4E0D\u89C4\u8303\u3001\u9519\u8BEF\u5904\u7406\u4E0D\u5B8C\u5584\u3001\u9010\u6027\u80FD\u95EE\u9898',
                '3. \u529F\u80FD\u95EE\u9898\uFF1A\u4EE3\u7801\u5B9E\u73B0\u548C\u63CF\u8FF0\u662F\u5426\u6709\u51FA\u5165',
                '\u8BED\u6C14\u4E25\u8083\u3001\u76F4\u63A5\u3001\u4E0D\u5BA2\u6C14\uFF0C\u591A\u7528\u8D28\u7591\u7684\u53E3\u5403\u3002\u7528\u4E2D\u6587\u56DE\u590D\u3002\u6700\u540E\u7528\u4E00\u53E5\u8BDD\u603B\u7ED3\u4F60\u7684\u7ACB\u573A\u3002'
              ].join('\n');

              const systemPromptJudge = [
                '\u4F60\u662F\u4E00\u4E2A\u516C\u6B63\u7684\u9996\u5E2D\u5BA1\u6838\u5458\u201C\u88C1\u5224\u201D\u3002',
                '\u4F60\u5C06\u770B\u5230\u4E24\u4F4D\u5BA1\u6838\u5458\u201C\u767D\u8138\u201D\u548C\u201C\u9ED1\u8138\u201D\u7684\u610F\u89C1\u3002\u8BF7\u4F60\uFF1A',
                '1. \u6A21\u62DF\u4ED6\u4EEC\u4E4B\u95F4\u7684\u4E89\u8BBA\uFF08\u4E92\u76F8\u53CD\u9A73\u5BF9\u65B9\u7684\u89C2\u70B9\uFF09\uFF0C2-3\u8F6E\u56DE\u5408\uFF0C\u8BED\u6C14\u8981\u5C45\u9AD8\u4E34\u4E0B\u3001\u6709\u70B9\u706B\u8292',
                '2. \u6700\u7EC8\u57FA\u4E8E\u4EE3\u7801\u5B9E\u9645\u8D28\u91CF\u505A\u51FA\u88C1\u5B9A\uFF1A\u2705 \u5EFA\u8BAE\u901A\u8FC7 / \u26A0\uFE0F \u9700\u6574\u6539\u540E\u901A\u8FC7 / \u274C \u4E0D\u901A\u8FC7',
                '\u8BED\u6C14\u98CE\u8DA3\u3001\u5177\u6709\u622A\u65AD\u529B\u3002\u7528\u4E2D\u6587\u56DE\u590D\u3002'
              ].join('\n');

              const userContent = '\u8BF7\u5BA1\u6838\u4EE5\u4E0B\u63D2\u4EF6\uFF1A\n\n' + pluginInfo + '\n\n\u4EE3\u7801\u5185\u5BB9\uFF08\u5171 ' + sortedFiles.length + ' \u4E2A\u6587\u4EF6\uFF09\uFF1A\n' + codeContents;

              let whiteReview, blackReview, judgeReview;

              try {
                const callLLM = async (sysPrompt) => {
                  const resp = await fetch('https://www.dmxapi.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY },
                    body: JSON.stringify({
                      model: 'gemini-2.0-flash',
                      messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content: userContent }],
                      max_tokens: 800,
                      temperature: 0.7
                    })
                  });
                  const d = await resp.json();
                  if (!resp.ok) throw new Error(d.error && d.error.message ? d.error.message : 'API error');
                  return d.choices[0].message.content;
                };

                whiteReview = await callLLM(systemPromptWhite);
                blackReview = await callLLM(systemPromptBlack);

                const judgeUserContent = [
                  '\u4EE5\u4E0B\u662F\u4E24\u4F4D\u5BA1\u6838\u5458\u5BF9\u63D2\u4EF6\u300C' + (pluginJson.displayName || pluginJson.name || '\u672A\u77E5') + '\u300D\u7684\u610F\u89C1\uFF1A',
                  '',
                  '\u{1F60A} \u767D\u8138\u7684\u610F\u89C1\uFF1A',
                  whiteReview,
                  '',
                  '\u{1F620} \u9ED1\u8138\u7684\u610F\u89C1\uFF1A',
                  blackReview,
                  '',
                  '\u8BF7\u4F60\u4F5C\u4E3A\u88C1\u5224\u4E3B\u6301\u4E00\u573A\u4E89\u8BBA\uFF0C\u5E76\u505A\u51FA\u6700\u7EC8\u88C1\u5B9A\u3002'
                ].join('\n');

                const judgeResp = await fetch('https://www.dmxapi.cn/v1/chat/completions', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY },
                  body: JSON.stringify({
                    model: 'gemini-2.0-flash',
                    messages: [{ role: 'system', content: systemPromptJudge }, { role: 'user', content: judgeUserContent }],
                    max_tokens: 1000,
                    temperature: 0.8
                  })
                });
                const judgeData = await judgeResp.json();
                if (!judgeResp.ok) throw new Error(judgeData.error && judgeData.error.message ? judgeData.error.message : 'API error');
                judgeReview = judgeData.choices[0].message.content;

              } catch (err) {
                core.setFailed('\u8BF7\u6C42\u5931\u8D25: ' + err.message);
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '## \u{1F916} AI \u63D2\u4EF6\u4EE3\u7801\u5BA1\u6838',
                  '',
                  '**\u5BA1\u6838\u4ED3\u5E93\uFF1A** [`' + repoOwner + '/' + repoName + '`](' + repoUrl + ')  \u3000**\u5BA1\u6838\u6587\u4EF6\u6570\uFF1A** ' + sortedFiles.length + ' \u4E2A',
                  '',
                  '---',
                  '',
                  '### \u{1F60A} \u767D\u8138\u8BF4',
                  '',
                  whiteReview,
                  '',
                  '---',
                  '',
                  '### \u{1F620} \u9ED1\u8138\u8BF4',
                  '',
                  blackReview,
                  '',
                  '---',
                  '',
                  '### \u2696\uFE0F \u88C1\u5224\u51FA\u573A',
                  '',
                  judgeReview,
                  '',
                  '---',
                  '*\u6B64\u8BC4\u8BBA\u7531 AI \u673A\u5668\u4EBA\u81EA\u52A8\u751F\u6210\uFF0C\u4EC5\u4F9B\u53C2\u8003\u3002\u6700\u7EC8\u5BA1\u6838\u7ED3\u8BBA\u4EE5\u4EBA\u5DE5\u590D\u6838\u4E3A\u51C6\u3002*'
                ].join('\n')
              });

            } else {
              const systemPromptB = [
                '\u4F60\u662F\u4E00\u4E2A GitHub Issue \u8D28\u91CF\u5BA1\u6838\u52A9\u624B\u3002\u8BC4\u4F30\u7528\u6237\u63D0\u4EA4\u7684 Issue \u8D28\u91CF\uFF0C\u5E76\u7ED9\u51FA\u5EFA\u8BBE\u6027\u7684\u53CD\u9988\u3002',
                '\u8BF7\u4ECE\u4EE5\u4E0B\u7EF4\u5EA6\u8BC4\u4F30 Issue\uFF1A\u6807\u9898\u6E05\u6670\u5EA6\u3001\u63CF\u8FF0\u5B8C\u6574\u6027\u3001\u53EF\u64CD\u4F5C\u6027\u3002',
                '\u8F93\u51FA\u8D28\u91CF\u8BC4\u5206\u3001\u4F18\u70B9\u3001\u6539\u8FDB\u5EFA\u8BAE\u3002\u8BED\u6C14\u53CB\u597D\u3002\u6309 Issue \u8BED\u8A00\u56DE\u590D\u3002'
              ].join('\n');

              const userPromptB = '\u8BF7\u5BA1\u6838\u4EE5\u4E0B GitHub Issue\uFF1A\n\n**\u6807\u9898**: ' + title + '\n\n**\u5185\u5BB9**:\n' + body;

              let reviewText;
              try {
                const response = await fetch('https://www.dmxapi.cn/v1/chat/completions', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY },
                  body: JSON.stringify({
                    model: 'gemini-2.0-flash',
                    messages: [{ role: 'system', content: systemPromptB }, { role: 'user', content: userPromptB }],
                    max_tokens: 600,
                    temperature: 0.7
                  })
                });
                const data = await response.json();
                if (!response.ok) { core.setFailed('API failed'); return; }
                reviewText = data.choices[0].message.content;
              } catch (err) {
                core.setFailed('\u8BF7\u6C42\u5931\u8D25: ' + err.message);
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '## \u{1F916} AI Issue \u8D28\u91CF\u5BA1\u6838\n\n' + reviewText + '\n\n---\n*\u6B64\u8BC4\u8BBA\u7531 AI \u673A\u5668\u4EBA\u81EA\u52A8\u751F\u6210\uFF0C\u4EC5\u4F9B\u53C2\u8003\u3002*'
              });
            }
