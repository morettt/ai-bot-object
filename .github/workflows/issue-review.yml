name: Issue Review Bot

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Review Issue with GPT-4o
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '(no description)';

            const systemPrompt = [
              "You are a GitHub Issue quality review assistant.",
              "Evaluate the issue from these dimensions:",
              "1. Title clarity: Is the title concise and accurate?",
              "2. Description completeness: For bugs: steps to reproduce, expected vs actual behavior, environment? For features: use case and expected outcome?",
              "3. Actionability: Is it specific enough for maintainers to act on?",
              "Output: quality score (1-4 stars), strengths, improvement suggestions.",
              "Reply in the same language as the issue (Chinese issue = Chinese reply, English issue = English reply)."
            ].join('\n');

            const userPrompt = "Please review this GitHub Issue:\n\nTitle: " + title + "\n\nBody:\n" + body;

            let reviewText;
            try {
              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                  ],
                  max_tokens: 600,
                  temperature: 0.7
                })
              });

              const data = await response.json();

              if (!response.ok) {
                console.error('OpenAI API error:', JSON.stringify(data));
                core.setFailed('OpenAI API failed: ' + (data.error && data.error.message ? data.error.message : 'unknown error'));
                return;
              }

              reviewText = data.choices[0].message.content;
            } catch (err) {
              console.error('Request failed:', err);
              core.setFailed('Request to OpenAI API failed: ' + err.message);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '## AI Issue Review\n\n' + reviewText + '\n\n---\n*This comment was automatically generated by an AI bot.*'
            });
